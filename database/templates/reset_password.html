<!doctype html>
<html><body>
<h1>Reset Password</h1>
<p><a href="/">Home</a></p>

<form method="POST" action="/reset-password">
  <label>Email <input name="email" type="email" required value="{{ email }}"></label><br><br>
  <label>Code <input name="code" type="text" required placeholder="6-digit code"></label><br><br>
  <label>New Password <input name="new_password" type="password" required></label><br><br>
  <button type="submit">Reset Password</button>
</form>
</body></html>
