<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Accounts</title>
</head>
<body>
  <h1>Accounts</h1>

  <p><a href="/">Home</a></p>

  <table border="1" cellpadding="8" cellspacing="0">
    <thead>
      <tr>
        <th>Account Name</th>
        <th>Food Genre</th>
        <th>City</th>
        <th>State</th>
        <th>Postal Code</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody>
      {% for a in accounts %}
        <tr>
          <td>{{ a.account_name }}</td>
          <td>{{ a.food_genre }}</td>
          <td>{{ a.city }}</td>
          <td>{{ a.state }}</td>
          <td>{{ a.postal_code }}</td>
          <td>{{ a.created_at }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
